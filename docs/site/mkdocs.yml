site_name: Vedix
site_url: https://docs.vedix.ai/
site_description: Research workbench that turns a topic into a venue-ready manuscript
site_author: Vedix
repo_url: https://github.com/vedix/vedix
edit_uri: edit/master/docs/site/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/atom
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Install: install.md
  - Getting started: getting-started.md
  - Concepts:
      - BYOK providers: byok.md
      - Languages: languages.md
      - Publisher templates: publishers.md
      - Rigor tracks: rigor-tracks.md
      - Training the classifier: training-the-classifier.md
      - Pre-print submission: preprint-submission.md
      - Federated palace: federated-palace.md
  - Surfaces:
      - Web UI: web-ui.md
      - IDE plugins: ide-plugins.md
      - SaaS overview: saas/overview.md
      - SaaS API reference: saas/api-reference.md
  - Reference:
      - CLI: reference/cli.md
      - MCP tools: reference/mcp-tools.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.snippets
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vedix/vedix
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/vedix_ai
  generator: false

copyright: Copyright &copy; 2026 Vedix &mdash; MIT licensed
